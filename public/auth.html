      type = type || "info";
      const authMessage = document.getElementById("authMessage");
      if (!authMessage) { debugLog(message); return; }
      authMessage.className = "text-center text-sm mt-4";
      if (type === "success") authMessage.className += " text-green-600";
      else if (type === "error") authMessage.className += " text-red-600";
      else authMessage.className += " text-blue-600";
      authMessage.textContent = message;
      authMessage.classList.remove("hidden");
      setTimeout(() => { authMessage.classList.add("hidden"); }, 5000);
    }

    function hideMessage() {
      const authMessage = document.getElementById("authMessage");
      if (authMessage) authMessage.classList.add("hidden");
    }

      // Language toggle active state
      if (window.i18n) {
        window.i18n.init();
        const active = 'color:#1d4ed8;font-weight:800;', inactive = 'color:#9ca3af;font-weight:700;';
        function updateLangBtns(lang) {
          const isEs = lang === 'es';
          const enBtn = document.getElementById('btn-en');
          const esBtn = document.getElementById('btn-es');
          if (enBtn) { enBtn.style.color = isEs ? '#9ca3af' : '#1d4ed8'; enBtn.style.fontWeight = isEs ? '700' : '800'; }
          if (esBtn) { esBtn.style.color = isEs ? '#1d4ed8' : '#9ca3af'; esBtn.style.fontWeight = isEs ? '800' : '700'; }
        }
        updateLangBtns(window.i18n.currentLang || 'en');
        document.addEventListener('languageChanged', (e) => updateLangBtns(e.detail.lang));
      }

      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const loginPanel = document.getElementById("loginPanel");
      const registerPanel = document.getElementById("registerPanel");
      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");

      debugLog("🚀 Auth page loaded");

      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          debugLog("✅ User already authenticated:", user.email);
          const hasPendingPlan = localStorage.getItem('pendingPlan');
          if (hasPendingPlan) {
            showMessage(t('auth.msg_session_active'), "success");
            setTimeout(() => { redirectAfterAuth(); }, 500);
          } else {
            showMessage(t('auth.msg_session_user', { email: user.email }), "success");
          }
        }
      });

      async function handleLoginSubmit(form) {
        const email = form.email.value.trim();
        const password = form.password.value.trim();
        debugLog("🔑 Attempting login for:", email);
        if (!email || !password) {
          showMessage(t('auth.error_required'), "error");
          return;
        }
        try {
          showMessage(t('auth.logging_in'), "info");
          const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
          debugLog("✅ Login successful:", userCredential.user.email);
          showMessage(t('auth.login_success'), "success");
          setTimeout(() => { redirectAfterAuth(); }, 1500);
        } catch (error) {
          debugLog("❌ Error en login:", error);
          showMessage("❌ " + formatFirebaseError(error), "error");
        }
      }

      function setActiveAuthTab(tab) {
        const isLogin = tab === "login";
        loginPanel.classList.toggle("hidden", !isLogin);
        registerPanel.classList.toggle("hidden", isLogin);
        tabLogin.classList.toggle("active", isLogin);
        tabRegister.classList.toggle("active", !isLogin);
        hideMessage();
        if (loginForm) loginForm.reset();
        if (registerForm) registerForm.reset();
      }

      function formatFirebaseError(error) {
        if (!error || !error.code) return error?.message || t('auth.error_unknown');
        switch (error.code) {
          case "auth/email-already-in-use":    return t('auth.error_email_in_use');
          case "auth/invalid-email":           return t('auth.error_invalid_email');
          case "auth/weak-password":           return t('auth.error_weak_password');
          case "auth/user-not-found":          return t('auth.error_user_not_found');
          case "auth/wrong-password":          return t('auth.error_wrong_password');
          case "auth/invalid-credential":      return t('auth.error_invalid_credential');
          case "auth/too-many-requests":       return t('auth.error_too_many_requests');
          case "auth/network-request-failed":  return t('auth.error_network');
          default:                             return error.message || t('auth.error_unknown');
        }
      }

      async function handlePasswordReset() {
        const emailInput = loginForm?.querySelector('input[name="email"]');
        const email = emailInput?.value?.trim();
        if (!email) {
          showMessage(t('auth.err_enter_email'), "error");
          emailInput?.focus();
          return;
        }
        try {
          showMessage(t('auth.msg_reset_sending'), "info");
          await firebase.auth().sendPasswordResetEmail(email);
          showMessage(t('auth.msg_reset_ok', { email }), "success");
        } catch (error) {
          debugLog("❌ Error en password reset:", error);
          showMessage("❌ " + formatFirebaseError(error), "error");
        }
      }

      if (loginForm) {
        loginForm.addEventListener("submit", (e) => { e.preventDefault(); handleLoginSubmit(e.target); });
      }

      const forgotLink = document.getElementById('forgotPasswordLink');
      if (forgotLink) {
        forgotLink.addEventListener('click', (e) => { e.preventDefault(); handlePasswordReset(); });
      }

      if (registerForm) {
        registerForm.addEventListener("submit", (e) => { e.preventDefault(); handleRegisterSubmit(e.target); });
      }

      if (tabLogin) tabLogin.addEventListener("click", () => setActiveAuthTab("login"));
      if (tabRegister) {
        tabRegister.addEventListener("click", () => {
          trackMeta("Lead", { source: "auth_tab_register" });
          setActiveAuthTab("register");
        });
      }

      const tabFromUrl = new URLSearchParams(window.location.search).get("tab");
      setActiveAuthTab(tabFromUrl === "register" ? "register" : "login");

      debugLog("✅ Auth page setup complete");
    });

    // ✅ FASE 3: Language selector helper
    window.selectRegLang = function(lang) {
      const hiddenInput = document.getElementById('reg-language');
      const btnEn = document.getElementById('reg-lang-en');
      const btnEs = document.getElementById('reg-lang-es');
      if (hiddenInput) hiddenInput.value = lang;
      if (lang === 'en') {
        if (btnEn) { btnEn.style.borderColor='#3b82f6'; btnEn.style.background='#eff6ff'; btnEn.style.color='#1d4ed8'; }
        if (btnEs) { btnEs.style.borderColor='#d1d5db'; btnEs.style.background='white'; btnEs.style.color='#6b7280'; }
      } else {
        if (btnEs) { btnEs.style.borderColor='#3b82f6'; btnEs.style.background='#eff6ff'; btnEs.style.color='#1d4ed8'; }
        if (btnEn) { btnEn.style.borderColor='#d1d5db'; btnEn.style.background='white'; btnEn.style.color='#6b7280'; }
      }
      // Also update the UI language preview immediately
      if (window.i18n) window.i18n.setLanguage(lang);
    };
    // Initialize selector to match current i18n language on page load
    document.addEventListener('DOMContentLoaded', () => {
      const initLang = localStorage.getItem('app_language') || 'en';
      if (initLang === 'es') window.selectRegLang?.('es');
    });


    let _redirecting = false;

    async function redirectAfterAuth() {
      if (_redirecting) return;
      _redirecting = true;

      const pendingPlan = localStorage.getItem('pendingPlan');
      debugLog('🔵 redirectAfterAuth, pendingPlan:', pendingPlan);

      if (pendingPlan) {
        localStorage.removeItem('pendingPlan');
        const checkReady = setInterval(() => {
          const user = firebase.auth().currentUser;
          if (user && window.StripeIntegration) {
            clearInterval(checkReady);
            debugLog('🔵 Iniciando checkout para:', pendingPlan);
            window.StripeIntegration.createCheckoutSession(pendingPlan)
              .catch(err => {
                debugLog('❌ Checkout error:', err);
                window.location.href = 'app.html';
              });
          }
        }, 500);
        setTimeout(() => {
          clearInterval(checkReady);
          if (!window.StripeIntegration || !firebase.auth().currentUser) {
            debugLog('❌ Timeout esperando Stripe/Auth');
            localStorage.setItem('pendingPlan', pendingPlan);
            window.location.href = 'app.html';
          }
        }, 10000);
      } else {
        window.location.href = 'app.html';
      }
    }
  </script>
