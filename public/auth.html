    /* 🎨 DESIGN SYSTEM - Dark Theme */
    :root {
      /* Colors */
      --bg-dark: #0a0a0f;
      --bg-darker: #050508;
      --bg-card: #141414;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #666666;

      /* Accent Colors - CYAN/ORANGE THEME */
      --primary-cyan: #00D9FF;
      --primary-orange: #FF6B35;
      --accent-blue: #3b82f6;

      /* Gradients */
      --gradient-primary: linear-gradient(90deg, #00D9FF 0%, #FF6B35 100%);
      --gradient-text: linear-gradient(90deg, #00D9FF, #FF6B35);

      /* Effects */
      --glass-bg: rgba(20, 20, 20, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    /* Header */
    header {
      position: relative;
      top: 0;
      margin-top: 0;
      z-index: 1000;
      padding: 1.25rem 0;
      background: transparent;
    }

    html,
    body {
      margin: 0 !important;
      padding: 0 !important;
    }

    header .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .logo-img {
      width: 3rem;
      height: 3rem;
      border-radius: 9999px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tabs */
    .tab-btn.active {
      background: var(--gradient-primary);
      color: white;
    }

    .tab-btn {
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--primary-cyan);
    }
  </style>

  <script>
    // ✅ Helper function para mostrar mensajes
    function showMessage(message, type = "info") {
      const authMessage = document.getElementById("authMessage");
      if (!authMessage) {
        debugLog(message);
        return;
      }

      // Limpiar clases anteriores
      authMessage.className = "text-center text-sm mt-4";

      // Agregar clase según tipo
      switch (type) {
        case "success":
          authMessage.className += " text-green-600";
          break;
        case "error":
          authMessage.className += " text-red-600";
          break;
        default:
          authMessage.className += " text-blue-600";
          break;
      }

      authMessage.textContent = message;
      authMessage.classList.remove("hidden");

      // Auto-hide después de 5 segundos
      setTimeout(() => {
        authMessage.classList.add("hidden");
      }, 5000);
    }

    function hideMessage() {
      const authMessage = document.getElementById("authMessage");
      if (authMessage) {
        authMessage.classList.add("hidden");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const loginPanel = document.getElementById("loginPanel");
      const registerPanel = document.getElementById("registerPanel");
      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");

      debugLog("🚀 Auth page loaded");

      // Verificar si el usuario ya está autenticado
      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          debugLog("✅ User already authenticated:", user.email);
          const hasPendingPlan = localStorage.getItem('pendingPlan');
          if (hasPendingPlan) {
            // Usuario ya logueado + plan pendiente → directo a checkout
            showMessage("Sesión activa, iniciando checkout...", "success");
            setTimeout(() => { redirectAfterAuth(); }, 500);
          } else {
            showMessage("Sesión activa: " + user.email + ". Haz clic en Iniciar Sesión para continuar.", "success");
          }
        }
      });

      async function handleLoginSubmit(form) {
        const email = form.email.value.trim();
        const password = form.password.value.trim();

        debugLog("🔑 Attempting login for:", email);

        if (!email || !password) {
          showMessage("⚠️ Todos los campos son obligatorios", "error");
          return;
        }

        try {
          showMessage("Iniciando sesión...", "info");
          const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
          debugLog("✅ Login successful:", userCredential.user.email);
          showMessage("✅ Inicio de sesión exitoso, redirigiendo...", "success");

          // Redirect after a short delay
          setTimeout(() => {
            redirectAfterAuth();
          }, 1500);
        } catch (error) {
          debugLog("❌ Error en login:", error);
          showMessage("❌ " + formatFirebaseError(error), "error");
        }
      }

      async function handleRegisterSubmit(form) {
        const fullName = form.fullName.value.trim();
        const email = form.email.value.trim();
        const password = form.password.value.trim();
        const phone = form.phone ? form.phone.value.trim() : '';

        debugLog("📝 Attempting registration for:", email);

        if (!fullName || !email || !password) {
          showMessage("⚠️ Nombre, correo y contraseña son obligatorios", "error");
          return;
        }

        if (password.length < 6) {
          showMessage("⚠️ La contraseña debe tener al menos 6 caracteres", "error");
          return;
        }

        try {
          showMessage("Creando cuenta...", "info");
          const userCred = await firebase.auth().createUserWithEmailAndPassword(email, password);
          debugLog("✅ Registration successful:", userCred.user.email);

          // Guardar información adicional del usuario vía initializeUserPlan
          if (typeof window.initializeUserPlan === 'function') {
            await window.initializeUserPlan(userCred.user.uid, email);
          }
          // Merge fullName y phone (campos extra que initializeUserPlan no incluye)
          await firebase.firestore().collection("users").doc(userCred.user.uid).set({
            fullName,
            phone: phone || '',
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });

          // Enviar email de bienvenida (no bloquea el registro si falla)
          firebase.firestore().collection("mail").add({
            to: [email],
            message: {
              subject: "¡Bienvenido a Smart Load Solution! 🚐",
              html: `<!DOCTYPE html>

        <tr>
          <td style="background:linear-gradient(135deg,#1e293b,#0f172a);padding:40px;text-align:center;border-bottom:2px solid #FF6D4A;">
            <h1 style="margin:0;font-size:28px;font-weight:800;color:#ffffff;">Smart<span style="color:#FF6D4A;">Load</span> Solution</h1>
            <p style="margin:8px 0 0;color:#94a3b8;font-size:14px;">Inteligencia de Carga para el Transportista Moderno</p>
          </td>
        </tr>
        <tr>
          <td style="padding:40px;">
            <h2 style="margin:0 0 16px;color:#ffffff;font-size:22px;">¡Bienvenido, ${fullName}! 👋</h2>
            <p style="margin:0 0 20px;color:#94a3b8;font-size:15px;line-height:1.6;">Tu cuenta ha sido creada exitosamente. Ya puedes empezar a usar la plataforma para tomar mejores decisiones en cada carga.</p>
            <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 28px;">
              <tr><td style="padding:12px;background:#0f172a;border-radius:8px;">
                <table width="100%"><tr>
                  <td width="40" style="font-size:24px;">🧮</td>
                  <td><p style="margin:0;color:#ffffff;font-size:14px;font-weight:600;">Calculator de Cargas</p><p style="margin:4px 0 0;color:#64748b;font-size:13px;">Calcula RPM, net profit y deadhead en segundos</p></td>
                </tr></table>
              </td></tr>
              <tr><td style="padding:4px 0;"></td></tr>
              <tr><td style="padding:12px;background:#0f172a;border-radius:8px;">
                <table width="100%"><tr>
                  <td width="40" style="font-size:24px;">📊</td>
                  <td><p style="margin:0;color:#ffffff;font-size:14px;font-weight:600;">Dashboard Financiero</p><p style="margin:4px 0 0;color:#64748b;font-size:13px;">Monitorea ingresos, gastos y rentabilidad mensual</p></td>
                </tr></table>
              </td></tr>
              <tr><td style="padding:4px 0;"></td></tr>
              <tr><td style="padding:12px;background:#0f172a;border-radius:8px;">
                <table width="100%"><tr>
                  <td width="40" style="font-size:24px;">🗺️</td>
                  <td><p style="margin:0;color:#ffffff;font-size:14px;font-weight:600;">Análisis de Zonas</p><p style="margin:4px 0 0;color:#64748b;font-size:13px;">Identifica zonas trampa y rutas más rentables</p></td>
                </tr></table>
              </td></tr>
            </table>
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr><td align="center">
                <a href="https://smartloadsolution.com/app.html" style="display:inline-block;background:#FF6D4A;color:#ffffff;text-decoration:none;padding:14px 36px;border-radius:8px;font-weight:700;font-size:15px;">Ir a la App →</a>
              </td></tr>
            </table>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 40px;border-top:1px solid #334155;text-align:center;">
            <p style="margin:0;color:#94a3b8;font-size:12px;">Smart Load Solution · <a href="https://smartloadsolution.com" style="color:#FF6D4A;text-decoration:none;">smartloadsolution.com</a></p>
            <p style="margin:8px 0 0;color:#64748b;font-size:11px;">Recibiste este email porque creaste una cuenta en nuestra plataforma.</p>

            }
          }).catch(e => debugLog("[auth] Email de bienvenida no enviado:", e.message));

          debugLog("✅ User profile saved");

          showMessage("✅ Cuenta creada exitosamente, redirigiendo...", "success");

          // ✅ Disparar evento de registro exitoso
          trackMeta("CompleteRegistration", {
            method: "email",
            value: 1.00,
            currency: "USD"
          });

          // ✅ Esperar para que el evento salga antes del redirect
          setTimeout(() => {
            redirectAfterAuth();
          }, 2500);

          return; // IMPORTANTÍSIMO para que no corra otro redirect viejo
        } catch (error) {
          debugLog("❌ Error en registro:", error);
          showMessage("❌ " + formatFirebaseError(error), "error");
        }
      }

      function setActiveAuthTab(tab) {
        const isLogin = tab === "login";

        loginPanel.classList.toggle("hidden", !isLogin);
        registerPanel.classList.toggle("hidden", isLogin);

        tabLogin.classList.toggle("active", isLogin);
        tabRegister.classList.toggle("active", !isLogin);

        hideMessage();

        if (loginForm) loginForm.reset();
        if (registerForm) registerForm.reset();
      }

      function formatFirebaseError(error) {
        if (!error || !error.code) return error?.message || "Error desconocido";

        switch (error.code) {
          case "auth/email-already-in-use":
            return "El correo ya está registrado";
          case "auth/invalid-email":
            return "Correo electrónico inválido";
          case "auth/weak-password":
            return "La contraseña debe tener al menos 6 caracteres";
          case "auth/user-not-found":
            return "Usuario no encontrado";
          case "auth/wrong-password":
            return "Contraseña incorrecta";
          case "auth/invalid-credential":
            return "Credenciales inválidas";
          case "auth/too-many-requests":
            return "Demasiados intentos fallidos. Intenta más tarde";
          case "auth/network-request-failed":
            return "Error de conexión. Verifica tu internet";
          default:
            return error.message || "Error desconocido";
        }
      }

      // ✅ Password Recovery
      async function handlePasswordReset() {
        const emailInput = loginForm?.querySelector('input[name="email"]');
        const email = emailInput?.value?.trim();

        if (!email) {
          showMessage("⚠️ Ingresa tu correo electrónico primero", "error");
          emailInput?.focus();
          return;
        }

        try {
          showMessage("Enviando enlace de recuperación...", "info");
          await firebase.auth().sendPasswordResetEmail(email);
          showMessage("✅ Enlace de recuperación enviado a " + email + ". Revisa tu bandeja de entrada.", "success");
        } catch (error) {
          debugLog("❌ Error en password reset:", error);
          showMessage("❌ " + formatFirebaseError(error), "error");
        }
      }

      // Event listeners
      if (loginForm) {
        loginForm.addEventListener("submit", (e) => {
          e.preventDefault();
          handleLoginSubmit(e.target);
        });
      }

      const forgotLink = document.getElementById('forgotPasswordLink');
      if (forgotLink) {
        forgotLink.addEventListener('click', (e) => {
          e.preventDefault();
          handlePasswordReset();
        });
      }

      if (registerForm) {
        registerForm.addEventListener("submit", (e) => {
          e.preventDefault();
          handleRegisterSubmit(e.target);
        });
      }

      if (tabLogin) {
        tabLogin.addEventListener("click", () => setActiveAuthTab("login"));
      }

      if (tabRegister) {
        tabRegister.addEventListener("click", () => {
          trackMeta("Lead", { source: "auth_tab_register" }); // 👤 Interés en registrarse
          setActiveAuthTab("register");
        });
      }

      // Establecer tab inicial
      const tabFromUrl = new URLSearchParams(window.location.search).get("tab");
      setActiveAuthTab(tabFromUrl === "register" ? "register" : "login");

      debugLog("✅ Auth page setup complete");
    });

    let _redirecting = false;

    async function redirectAfterAuth() {
      if (_redirecting) return;
      _redirecting = true;

      const pendingPlan = localStorage.getItem('pendingPlan');
      debugLog('🔵 redirectAfterAuth, pendingPlan:', pendingPlan);

      if (pendingPlan) {
        localStorage.removeItem('pendingPlan');
        // Esperar a que el usuario y StripeIntegration estén listos
        const checkReady = setInterval(() => {
          const user = firebase.auth().currentUser;
          if (user && window.StripeIntegration) {
            clearInterval(checkReady);
            debugLog('🔵 Iniciando checkout para:', pendingPlan);
            window.StripeIntegration.createCheckoutSession(pendingPlan)
              .catch(err => {
                debugLog('❌ Checkout error:', err);
                window.location.href = 'app.html';
              });
          }
        }, 500);
        // Safety: si después de 10s no está listo, ir a app.html
        setTimeout(() => {
          clearInterval(checkReady);
          if (!window.StripeIntegration || !firebase.auth().currentUser) {
            debugLog('❌ Timeout esperando Stripe/Auth');
            localStorage.setItem('pendingPlan', pendingPlan);
            window.location.href = 'app.html';
          }
        }, 10000);
      } else {
        window.location.href = 'app.html';
      }
    }
  </script>

</body>
